name: Redirect Issues to Discord

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Comment, close, and lock issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for opening an issue! This repository's issue tracker is not actively monitored. For support and bug reports, please join our Discord community instead: https://discord.com/invite/nfgutJxkDY"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });