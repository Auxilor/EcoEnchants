name: Release Artifact
on:
  release:
    types: [published]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build libreforgeJar --full-stacktrace
      - name: Locate final libreforge jar
        id: find_jar
        run: |
          jar_path="$(find bin -maxdepth 1 -type f -name '*.jar' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [ -z "$jar_path" ]; then
            echo "No final libreforge jar was generated in bin" >&2
            exit 1
          fi
          echo "jar_path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "jar_name=$(basename "$jar_path")" >> "$GITHUB_OUTPUT"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_jar.outputs.jar_name }}
          path: ${{ steps.find_jar.outputs.jar_path }}
          if-no-files-found: error
      - name: Attach jar to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_jar.outputs.jar_path }}
          fail_on_unmatched_files: true
